server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- API reverse proxy -------------------------------------------------
    # The browser calls /api/... on this SAME origin; nginx forwards it to the
    # backend container. `api` is the compose service name, resolved by
    # Docker's internal DNS. The trailing slash on proxy_pass strips the /api
    # prefix: /api/tasks -> /tasks on the backend.
    #
    # Same-origin means: no CORS preflight, and the session cookie is sent
    # without any cross-site cookie rules getting in the way.
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Long-lived assets -------------------------------------------------
    # Production builds use outputHashing:"all", so these filenames contain a
    # content hash. A new build produces a new name, so caching forever is safe.
    location ~* \.(?:js|css|woff2?|png|jpe?g|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- SPA fallback ------------------------------------------------------
    # index.html is NOT hashed, so it must never be cached, or users get a
    # stale shell pointing at deleted bundles.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
