<main class="p-8 max-w-7xl mx-auto">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
    <app-task-list title="Pending" [tasks]="pendingTasks()" [status]="taskStatus.Pending" />
    <app-task-list
      title="In Progress"
      [tasks]="inProgressTasks()"
      [status]="taskStatus.InProgress"
    />
    <app-task-list title="Completed" [tasks]="completedTasks()" [status]="taskStatus.Completed" />
  </div>
</main>

<router-outlet />
