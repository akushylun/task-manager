<div class="login-container">
  <form class="login-card" [formGroup]="form" (ngSubmit)="onSubmit()">
    <h1 class="login-header">Login</h1>

    <mat-form-field appearance="outline">
      <mat-label>Email:</mat-label>
      <input matInput type="email" id="email" formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput type="password" id="password" formControlName="password" />
    </mat-form-field>

    <button matButton="filled" color="accent" type="submit">Login</button>
  </form>
</div>
