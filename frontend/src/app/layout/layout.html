@if (user$ | async) {
  <mat-toolbar color="primary" class="toolbar">
    <button matButton="outlined" routerLink="/tasks">Tasks</button>
    <button matButton="outlined" routerLink="/account">Account</button>
    <span class="spacer"></span>
    <button matButton="outlined" (click)="logout()">Logout</button>
  </mat-toolbar>
}

<main>
  @if (isNavigating()) {
    <mat-spinner class="spinner-container"></mat-spinner>
  }
  <router-outlet />
</main>
